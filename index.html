<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM SHEET · FPL Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0B3D2E; --cream: #F2EFE6; --amber: #E8A33D;
    --muted: #8C948F; --border: #DDD8C8; --up: #5E8C6A; --down: #B5503D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: #1C231F; min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  #header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  #header h1 { font-family: 'Oswald', sans-serif; font-size: 22px; color: var(--green); display: inline; }
  #header .sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-left: 10px; }
  #tabrail { display: flex; overflow-x: auto; background: var(--green); scrollbar-width: none; }
  #tabrail::-webkit-scrollbar { display: none; }
  #tabrail button { flex: 0 0 auto; padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-right: 1px solid rgba(255,255,255,0.08); background: transparent; color: #C9D6CC; font-weight: 500; }
  #tabrail button.active { background: var(--cream); color: var(--green); font-weight: 700; }
  #main { padding: 16px; max-width: 980px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 16px 18px; margin-bottom: 14px; }
  .card-title { font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--green); font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); padding: 6px 6px; border-bottom: 1px solid var(--border); }
  td { padding: 7px 6px; font-size: 13px; border-bottom: 1px solid #EDEAE0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAF8F2; }
  .pos { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 5px; border-radius: 3px; color: var(--green); font-weight: 700; }
  .pos-GKP { background: #E8A33D; } .pos-DEF { background: #6FA88A; } .pos-MID { background: #7FAEDB; } .pos-FWD { background: #E0654D; }
  .input { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; margin-bottom: 8px; }
  .input:focus { border-color: var(--green); }
  .btn { padding: 9px 16px; border-radius: 4px; border: none; font-size: 13px; font-weight: 600; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: none; border: none; color: var(--down); font-size: 12px; padding: 0; }
  .pos-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .pos-filter { padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); background: #fff; color: #1C231F; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
  .pos-filter.active { border-color: var(--green); background: var(--green); color: #fff; }
  .dropdown { border: 1px solid #EDEAE0; border-radius: 4px; margin-bottom: 8px; overflow: hidden; max-height: 240px; overflow-y: auto; }
  .dropdown-item { padding: 8px 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #F2EFE6; display: flex; justify-content: space-between; align-items: center; }
  .dropdown-item:hover { background: #FAF8F2; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .bar-label { font-size: 12px; width: 90px; color: #5C6B66; flex-shrink: 0; }
  .bar-track { flex: 1; background: #EDEAE0; height: 8px; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .bar-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; width: 38px; text-align: right; flex-shrink: 0; }
  .empty { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 13px; font-style: italic; }
  .verdict { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
  .verdict-hold { color: var(--up); border: 1px solid var(--up); }
  .verdict-monitor { color: #A8791E; border: 1px solid #A8791E; }
  .verdict-out { color: var(--down); border: 1px solid var(--down); }
  .transfer-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border: 1px solid #EDEAE0; border-radius: 5px; margin-bottom: 8px; gap: 8px; }
  .transfer-row.hold { background: #FAFCF8; } .transfer-row.monitor { background: #FFFBF0; } .transfer-row.out { background: #FDF4F1; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }
  .price-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F2EFE6; font-size: 13px; }
  .consensus-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; background: var(--green); color: #fff; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
  .tip-box { background: #FBF6E9; border: 1px solid var(--amber); border-radius: 6px; padding: 12px 14px; font-size: 12px; color: #7A5A1E; margin-bottom: 14px; }
  .score-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: #EDEAE0; margin-top: 4px; }
  .score-fill { background: var(--green); border-radius: 3px; }

  /* ── PITCH LAYOUT ── */
  .pitch { background: linear-gradient(180deg, #1a6b3a 0%, #1d7a42 50%, #1a6b3a 100%); border-radius: 8px; padding: 16px 8px; position: relative; overflow: hidden; margin-bottom: 14px; }
  .pitch::before { content:''; position:absolute; top:50%; left:10%; right:10%; height:2px; background:rgba(255,255,255,0.15); }
  .pitch::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:80px; height:80px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); }
  .pitch-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
  .pitch-row:last-child { margin-bottom: 0; }
  .player-card { background: rgba(255,255,255,0.92); border-radius: 5px; padding: 5px 4px; text-align: center; width: 68px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; flex-shrink: 0; }
  .player-card:hover { border-color: var(--amber); }
  .player-card .pc-pos { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; color: var(--green); display: block; }
  .player-card .pc-name { font-size: 11px; font-weight: 600; color: #1C231F; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-card .pc-pts { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); display: block; }
  .pc-actions { display: flex; gap: 2px; margin-top: 4px; justify-content: center; }
  .player-card.captain { border-color: var(--amber); background: #FFFBF0; }
  .player-card.vc { border-color: #7FAEDB; background: #F0F7FF; }
  .bench-strip { display: flex; gap: 6px; justify-content: center; padding: 10px 8px 4px; border-top: 2px dashed rgba(255,255,255,0.2); margin-top: 8px; }
  .bench-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 4px; letter-spacing: 0.04em; }

  /* ── GW RECOMMENDATION ── */
  .gw-rec { border-radius: 8px; padding: 16px 18px; margin-bottom: 14px; }
  .gw-rec.hold { background: linear-gradient(135deg, #EDFAF0, #F5FFF7); border: 1px solid var(--up); }
  .gw-rec.act { background: linear-gradient(135deg, #FBF6E9, #FFFDF5); border: 1px solid var(--amber); }
  .gw-rec.urgent { background: linear-gradient(135deg, #FDF4F1, #FFF8F6); border: 1px solid var(--down); }
  .gw-rec-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .gw-rec-title { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .gw-rec-body { font-size: 13px; color: #3A4A3E; line-height: 1.5; }
  .gw-rec-bullets { margin-top: 8px; padding-left: 0; list-style: none; }
  .gw-rec-bullets li { font-size: 12px; color: #3A4A3E; padding: 3px 0; padding-left: 14px; position: relative; }
  .gw-rec-bullets li::before { content: '→'; position: absolute; left: 0; color: var(--muted); }

  /* ── IMAGE UPLOAD ── */
  .upload-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; transition: border-color 0.15s; }
  .upload-zone:hover { border-color: var(--green); }
  .upload-zone input { display: none; }

  footer { padding: 20px; text-align: center; font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .text-muted { color: var(--muted); }
  .text-up { color: var(--up); }
  .text-down { color: var(--down); }
  .text-amber { color: var(--amber); font-weight: 700; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: #C9D6CC; border-radius: 4px; }

  /* GW selector */
  .gw-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .gw-selector label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }
  .gw-selector select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: #fff; }
</style>
</head>
<body>
<div id="header">
  <h1>TEAM SHEET</h1>
  <span class="sub" id="season-label">FPL ANALYTICS · LOADING</span>
</div>
<div id="tabrail">
  <button class="active" data-tab="team">My Team</button>
  <button data-tab="stats">Stats</button>
  <button data-tab="value">Value &amp; Form</button>
  <button data-tab="experts">Experts</button>
  <button data-tab="differentials">Differentials</button>
  <button data-tab="transfers">Transfers</button>
</div>
<div id="main">
  <div id="loading" style="padding:40px;text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.04em">PULLING LIVE DATA FROM FPL API…</div>
  <div id="content" style="display:none"></div>
</div>
<footer>DATA: OFFICIAL FPL API · UPDATES LIVE ON EACH LOAD</footer>

<script>
const PROXY = '/api/fpl';
const POSMAP = { 1:'GKP', 2:'DEF', 3:'MID', 4:'FWD' };

let state = {
  players:[], teams:[], fixtures:[], teamById:{},
  myTeamIds:[], captainId:null, viceCaptainId:null, benchIds:[],
  expertPicks:[], activeTab:'team',
  statsPos:'MID', valuePos:'ALL', expertsGW:'all',
  teamHistory:{}
};

// ── STORAGE ──────────────────────────────────────────────────────────
function lsGet(k,fb){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

// ── FETCH ─────────────────────────────────────────────────────────────
async function fplFetch(path){
  const res = await fetch(`${PROXY}?path=${encodeURIComponent(path)}`);
  if(!res.ok) throw new Error(`Proxy error ${res.status}`);
  return res.json();
}

// ── NORMALISE for search (strip accents) ─────────────────────────────
function normalise(str){
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

// ── TABS ──────────────────────────────────────────────────────────────
document.querySelectorAll('#tabrail button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#tabrail button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.activeTab = btn.dataset.tab;
    render();
  });
});

// ── HELPERS ───────────────────────────────────────────────────────────
function posTag(pos){ return `<span class="pos pos-${pos}">${pos}</span>`; }

// Custom FDR: based on recent results (goals scored + conceded, home/away weighted)
function customFDR(teamId, lookahead=5){
  const upcoming = state.fixtures
    .filter(f=>!f.finished && (f.team_h===teamId||f.team_a===teamId))
    .slice(0,lookahead);
  if(!upcoming.length) return null;

  const scores = upcoming.map(f=>{
    const isHome = f.team_h===teamId;
    const oppId = isHome ? f.team_a : f.team_h;
    const hist = state.teamHistory[oppId] || [];
    if(!hist.length) return 3; // fallback to mid difficulty
    const last10 = hist.slice(-10);
    // Opponent's avg goals scored (= our defensive challenge)
    const oppScored = last10.reduce((s,g)=>s+g.scored,0)/last10.length;
    // Opponent's avg goals conceded (= our attacking opportunity)
    const oppConceded = last10.reduce((s,g)=>s+g.conceded,0)/last10.length;
    // Home advantage factor
    const homeAdj = isHome ? -0.2 : 0.2;
    // Score 1-5: higher = harder for us
    // Hard if opp scores a lot and concedes little
    const raw = (oppScored * 1.2 - oppConceded * 0.8 + 3 + homeAdj);
    return Math.min(5, Math.max(1, raw));
  });
  return scores.reduce((a,b)=>a+b,0)/scores.length;
}

function fdrLabel(fdr){
  if(fdr===null) return '–';
  return fdr.toFixed(1);
}
function fdrColor(fdr){
  if(fdr===null) return 'var(--muted)';
  if(fdr<=2.2) return '#2d7a4f';
  if(fdr<=3.2) return '#8C948F';
  if(fdr<=4) return '#c47a2d';
  return '#B5503D';
}

function pearson(xs,ys){
  const n=xs.length; if(n<2)return 0;
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  let num=0,dx2=0,dy2=0;
  for(let i=0;i<n;i++){const dx=xs[i]-mx,dy=ys[i]-my;num+=dx*dy;dx2+=dx*dx;dy2+=dy*dy;}
  const d=Math.sqrt(dx2*dy2); return d===0?0:num/d;
}

// Composite player score: weighted by stat correlations at position
const STAT_FIELDS=[
  {key:'expected_goal_involvements',label:'xGI'},
  {key:'expected_goals',label:'xG'},
  {key:'expected_assists',label:'xA'},
  {key:'influence',label:'Influence'},
  {key:'creativity',label:'Creativity'},
  {key:'threat',label:'Threat'},
  {key:'ict_index',label:'ICT'},
  {key:'bps',label:'BPS'},
  {key:'minutes',label:'Minutes'},
  {key:'clean_sheets',label:'Clean sheets'},
  {key:'saves',label:'Saves'},
];

function getCorrelations(pos){
  const filtered=state.players.filter(p=>POSMAP[p.element_type]===pos&&p.minutes>270);
  const pts=filtered.map(p=>p.total_points);
  return STAT_FIELDS.map(f=>{
    const vals=filtered.map(p=>parseFloat(p[f.key])||0);
    return {...f, r:pearson(vals,pts), n:filtered.length};
  }).sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
}

function compositeScore(player){
  const corrs=getCorrelations(POSMAP[player.element_type]);
  const topCorrs=corrs.filter(c=>Math.abs(c.r)>0.15).slice(0,6);
  if(!topCorrs.length) return 0;
  let score=0, totalWeight=0;
  topCorrs.forEach(c=>{
    const val=parseFloat(player[c.key])||0;
    const weight=Math.abs(c.r);
    // Normalise against position peers
    const peers=state.players.filter(p=>POSMAP[p.element_type]===POSMAP[player.element_type]&&p.minutes>90);
    const vals=peers.map(p=>parseFloat(p[c.key])||0);
    const max=Math.max(...vals)||1;
    score+=(val/max)*weight;
    totalWeight+=weight;
  });
  return totalWeight>0 ? score/totalWeight : 0;
}

// Overall transfer score — no differential penalty, expert = mild positive signal
function transferScore(player){
  const form = parseFloat(player.form)||0;
  const fdr = customFDR(player.team)||3;
  const stats = compositeScore(player);
  const ppm = player.total_points/(player.now_cost/10);
  const expertIds = new Set(state.expertPicks.map(e=>Number(e.playerId)));
  const expertBoost = expertIds.has(player.id) ? 0.15 : 0; // meaningful signal

  // Normalise each component 0-1 approx
  const formScore = Math.min(form/12, 1);
  const fixtureScore = Math.max(0, (5-fdr)/4);
  const ppmScore = Math.min(ppm/30, 1);

  return (formScore*0.32) + (fixtureScore*0.23) + (stats*0.23) + (ppmScore*0.1) + (expertBoost*0.12);
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('content');
  switch(state.activeTab){
    case 'team': el.innerHTML=renderTeam(); bindTeam(); break;
    case 'stats': el.innerHTML=renderStats(); bindStats(); break;
    case 'value': el.innerHTML=renderValue(); bindValue(); break;
    case 'experts': el.innerHTML=renderExperts(); bindExperts(); break;
    case 'differentials': el.innerHTML=renderDifferentials(); break;
    case 'transfers': el.innerHTML=renderTransfers(); bindTransfers(); break;
  }
}

// ── MY TEAM — pitch formation layout ──────────────────────────────────
function renderTeam(){
  const myPlayers=state.myTeamIds.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
  const sorted=[...myPlayers].sort((a,b)=>a.element_type-b.element_type);

  const gkps=sorted.filter(p=>p.element_type===1);
  const defs=sorted.filter(p=>p.element_type===2);
  const mids=sorted.filter(p=>p.element_type===3);
  const fwds=sorted.filter(p=>p.element_type===4);

  // Split XI vs bench using persisted benchIds, fallback to automatic
  const autoBench=new Set();
  const autoXi=[...gkps.slice(0,1),...defs.slice(0,4),...mids.slice(0,4),...fwds.slice(0,2)].slice(0,11);
  myPlayers.forEach(p=>{ if(!autoXi.includes(p)) autoBench.add(p.id); });
  const userBenchIds=new Set(state.benchIds.filter(id=>state.myTeamIds.includes(id)));
  const effectiveBench=userBenchIds.size>0?userBenchIds:autoBench;
  const bench=myPlayers.filter(p=>effectiveBench.has(p.id));
  const benchSet=effectiveBench;

  function playerCard(p,isBench=false){
    const isCap=p.id===state.captainId;
    const isVC=p.id===state.viceCaptainId;
    const inBench=state.benchIds.includes(p.id)||(effectiveBench&&effectiveBench.has(p.id)&&!state.benchIds.length);
    const capStyle=isCap?'background:#E8A33D;color:#fff':'background:rgba(255,255,255,0.5);color:#555';
    const vcStyle=isVC?'background:#7FAEDB;color:#fff':'background:rgba(255,255,255,0.5);color:#555';
    const benchStyle=inBench?'background:var(--green);color:#fff':'background:rgba(255,255,255,0.5);color:#555';
    return `<div class="player-card${isCap?' captain':isVC?' vc':''}">
      <span class="pc-pos">${POSMAP[p.element_type]}</span>
      <span class="pc-name">${isCap?'<b style="color:var(--amber)">(C)</b> ':isVC?'<b style="color:#7FAEDB">(V)</b> ':''}${p.web_name}</span>
      <span class="pc-pts">${p.total_points}pts · £${(p.now_cost/10).toFixed(1)}m</span>
      <div class="pc-actions">
        <button onclick="event.stopPropagation();setRole(${p.id},'captain')" style="${capStyle};border:none;border-radius:3px;font-size:10px;font-weight:700;padding:2px 5px;cursor:pointer">C</button>
        <button onclick="event.stopPropagation();setRole(${p.id},'vc')" style="${vcStyle};border:none;border-radius:3px;font-size:10px;font-weight:700;padding:2px 5px;cursor:pointer">VC</button>
        <button onclick="event.stopPropagation();setRole(${p.id},'bench')" style="${benchStyle};border:none;border-radius:3px;font-size:10px;padding:2px 5px;cursor:pointer" title="${inBench?'Move to XI':'Move to bench'}">&#8645;</button>
        <button onclick="event.stopPropagation();setRole(${p.id},'remove')" style="background:rgba(255,255,255,0.5);color:var(--down);border:none;border-radius:3px;font-size:10px;padding:2px 5px;cursor:pointer">✕</button>
      </div>
    </div>`;
  }

  const xiRows=[];
  if(gkps.slice(0,1).length) xiRows.push(`<div class="pitch-row">${gkps.slice(0,1).map(p=>playerCard(p)).join('')}</div>`);
  if(defs.slice(0,4).length) xiRows.push(`<div class="pitch-row">${defs.slice(0,4).map(p=>playerCard(p)).join('')}</div>`);
  if(mids.slice(0,4).length) xiRows.push(`<div class="pitch-row">${mids.slice(0,4).map(p=>playerCard(p)).join('')}</div>`);
  if(fwds.slice(0,2).length) xiRows.push(`<div class="pitch-row">${fwds.slice(0,2).map(p=>playerCard(p)).join('')}</div>`);

  const totalCost=myPlayers.reduce((s,p)=>s+p.now_cost,0)/10;

  return `
    <div class="card">
      <div class="card-title">Build your squad</div>
      <div class="card-sub">Search and add your 15 FPL players. Tap a player card to set captain / remove.</div>
      <input class="input" id="player-search" placeholder="Search player name…" autocomplete="off">
      <div id="search-results"></div>
    </div>
    ${myPlayers.length===0 ? `<div class="card"><div class="empty">Add players above to see your squad on the pitch.</div></div>` : `
    <div class="pitch">
      ${xiRows.join('')}
      ${bench.length?`<div class="bench-label">BENCH</div><div class="bench-strip">${bench.map(p=>playerCard(p,true)).join('')}</div>`:''}
    </div>
    <div class="card" style="padding:12px 14px">
      <div style="display:flex;justify-content:space-between;font-size:13px">

window.setRole=function(id,role){
  if(role==='captain'){
    if(state.captainId===id){state.captainId=null;}
    else{
      if(state.viceCaptainId===id) state.viceCaptainId=null;
      state.captainId=id;
    }
  } else if(role==='vc'){
    if(state.viceCaptainId===id){state.viceCaptainId=null;}
    else{
      if(state.captainId===id) state.captainId=null;
      state.viceCaptainId=id;
    }
  } else if(role==='bench'){
    // Toggle bench status
    const inBench=state.benchIds.includes(id);
    if(inBench){state.benchIds=state.benchIds.filter(x=>x!==id);}
    else{state.benchIds=[...state.benchIds,id];}
    lsSet('fpl_bench',state.benchIds);
  } else if(role==='remove'){
    removePlayer(id);
    return;
  }
  lsSet('fpl_captain',state.captainId);
  lsSet('fpl_vc',state.viceCaptainId);
  render();
};
window.addPlayer=function(id){
  if(state.myTeamIds.length>=15)return;
  state.myTeamIds=[...state.myTeamIds,id];
  lsSet('fpl_my_team',state.myTeamIds);
  render();
};
window.removePlayer=function(id){
  state.myTeamIds=state.myTeamIds.filter(x=>x!==id);
  if(state.captainId===id) state.captainId=null;
  lsSet('fpl_my_team',state.myTeamIds);
  lsSet('fpl_captain',state.captainId);
  render();
};

// ── STATS ─────────────────────────────────────────────────────────────
function renderStats(){
  const pos=state.statsPos;
  const filtered=state.players.filter(p=>POSMAP[p.element_type]===pos&&p.minutes>270);
  const corrs=getCorrelations(pos);

  // Score every player, then compute over/underperformance
  const allScored=filtered.map(p=>{
    const comp=compositeScore(p);
    const ppm=p.total_points/(p.now_cost/10);
    // Predict points from comp score relative to position average
    const avgComp=filtered.reduce((s,q)=>s+compositeScore(q),0)/filtered.length||1;
    const avgPts=filtered.reduce((s,q)=>s+q.total_points,0)/filtered.length||1;
    const predictedPts=(comp/avgComp)*avgPts;
    const delta=p.total_points-predictedPts; // +ve = overperforming, -ve = underperforming
    const deltaRatio=delta/Math.max(avgPts,1);
    return{...p,comp,ppm,predictedPts,delta,deltaRatio};
  });

  const topByStats=[...allScored].sort((a,b)=>b.comp-a.comp).slice(0,12);

  // Overperformers: points well above what stats predict (regression risk)
  const overperformers=[...allScored]
    .filter(p=>p.deltaRatio>0.2)
    .sort((a,b)=>b.deltaRatio-a.deltaRatio).slice(0,6);

  // Underperformers: stats say they should score more (breakout candidates)
  const underperformers=[...allScored]
    .filter(p=>p.deltaRatio<-0.2&&p.comp>0.3)
    .sort((a,b)=>a.deltaRatio-b.deltaRatio).slice(0,6);

  const filterBtns=['GKP','DEF','MID','FWD'].map(p=>
    `<button class="pos-filter ${p===pos?'active':''}" data-pos="${p}">${p}</button>`).join('');

  const bars=corrs.map(c=>`
    <div class="bar-row">
      <span class="bar-label">${c.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.abs(c.r)*100}%;background:${c.r>=0?'#5E8C6A':'#B5503D'}"></div></div>
      <span class="bar-val">${c.r.toFixed(2)}</span>
    </div>`).join('');

  const topRows=topByStats.map((p,i)=>`
    <tr>
      <td style="color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace">${i+1}</td>
      <td>${p.web_name}</td>
      <td class="text-muted" style="font-size:12px">${state.teamById[p.team]?.short_name||''}</td>
      <td class="mono" style="font-size:12px">£${(p.now_cost/10).toFixed(1)}m</td>
      <td><div class="score-bar" style="width:70px"><div class="score-fill" style="width:${p.comp*100}%"></div></div></td>
      <td class="mono" style="font-size:12px">${p.total_points}pts</td>
    </tr>`).join('');

  const overRows=overperformers.length===0
    ?`<div class="empty">No clear overperformers detected.</div>`
    :overperformers.map(p=>`
    <tr>
      <td>${posTag(POSMAP[p.element_type])} &nbsp;${p.web_name}</td>
      <td class="text-muted" style="font-size:12px">${state.teamById[p.team]?.short_name||''}</td>
      <td class="mono" style="font-size:12px">${p.total_points}pts</td>
      <td class="mono" style="font-size:12px;color:var(--muted)">${Math.round(p.predictedPts)}pts expected</td>
      <td style="font-size:12px;color:var(--down);font-weight:600">+${Math.round(p.delta)} ⚠</td>
    </tr>`).join('');

  const underRows=underperformers.length===0
    ?`<div class="empty">No clear breakout candidates detected.</div>`
    :underperformers.map(p=>`
    <tr>
      <td>${posTag(POSMAP[p.element_type])} &nbsp;${p.web_name}</td>
      <td class="text-muted" style="font-size:12px">${state.teamById[p.team]?.short_name||''}</td>
      <td class="mono" style="font-size:12px">${p.total_points}pts</td>
      <td class="mono" style="font-size:12px;color:var(--muted)">${Math.round(p.predictedPts)}pts expected</td>
      <td style="font-size:12px;color:var(--up);font-weight:600">${Math.round(p.delta)} ✦</td>
    </tr>`).join('');

  return `
    <div class="card">
      <div class="card-title">What correlates to points?</div>
      <div class="card-sub">Correlation of each stat with total points · ${filtered.length} players (min 270 mins)</div>
      <div class="pos-filters" id="stats-filters">${filterBtns}</div>
      ${filtered.length<5?`<div class="empty">Not enough data for this position yet.</div>`:bars}
    </div>
    <div class="card">
      <div class="card-title">Top ${pos} targets — stat composite</div>
      <div class="card-sub">Weighted by stats that actually correlate to points at this position</div>
      <table>
        <thead><tr><th>#</th><th>Player</th><th>Team</th><th>Price</th><th>Stat score</th><th>Pts</th></tr></thead>
        <tbody>${topRows}</tbody>
      </table>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Regression risks ⚠</div>
        <div class="card-sub">Points well above what stats predict — form may not last</div>
        <table>
          <thead><tr><th>Player</th><th>Team</th><th>Actual</th><th>Expected</th><th>Gap</th></tr></thead>
          <tbody>${overRows}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">Breakout candidates ✦</div>
        <div class="card-sub">Stats suggest more points than they've scored — potentially due a run</div>
        <table>
          <thead><tr><th>Player</th><th>Team</th><th>Actual</th><th>Expected</th><th>Gap</th></tr></thead>
          <tbody>${underRows}</tbody>
        </table>
      </div>
    </div>`;
}

  });

function renderValue(){
  const pos=state.valuePos;
  const filtered=state.players
    .filter(p=>p.minutes>90)
    .filter(p=>pos==='ALL'||POSMAP[p.element_type]===pos)
    .map(p=>{
      const fdr=customFDR(p.team);
      const form=parseFloat(p.form)||0;
      const net=(p.transfers_in_event||0)-(p.transfers_out_event||0);
      const goodForm=form>=5, easyRun=fdr&&fdr<=2.4, hardRun=fdr&&fdr>=3.8;
      let read='Steady',readColor='var(--muted)';
      if(goodForm&&easyRun){read='✦ In-form + easy run';readColor='var(--up)';}
      else if(goodForm&&hardRun){read='In-form, tough run';readColor='var(--amber)';}
      else if(!goodForm&&easyRun){read='Cold, fixtures turn';readColor='#7FAEDB';}
      return{...p,fdr,net,read,readColor};
    })
    .sort((a,b)=>parseFloat(b.form)-parseFloat(a.form));

  const filterBtns=['ALL','GKP','DEF','MID','FWD'].map(p=>
    `<button class="pos-filter ${p===pos?'active':''}" data-pos="${p}">${p}</button>`).join('');

  const rows=filtered.slice(0,15).map(p=>`
    <tr>
      <td>${posTag(POSMAP[p.element_type])} &nbsp;${p.web_name}</td>
      <td class="text-muted" style="font-size:12px">${state.teamById[p.team]?.short_name||''}</td>
      <td class="mono" style="font-size:12px">${p.form}</td>
      <td class="mono" style="font-size:12px;color:${fdrColor(p.fdr)}">${fdrLabel(p.fdr)}</td>
      <td style="color:${p.readColor};font-size:11px;font-weight:600">${p.read}</td>
    </tr>`).join('');

  const risers=[...filtered].sort((a,b)=>b.net-a.net).slice(0,6);
  const fallers=[...filtered].sort((a,b)=>a.net-b.net).slice(0,6);

  return`
    <div class="card">
      <div class="card-title">Form vs upcoming fixtures</div>
      <div class="card-sub">Custom FDR based on last 10 results (goals scored + conceded, home/away weighted) · ✦ = golden combo</div>
      <div class="pos-filters" id="value-filters">${filterBtns}</div>
      <table>
        <thead><tr><th>Player</th><th>Team</th><th>Form</th><th>Custom FDR</th><th>Read</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Price rise watch</div>
        <div class="card-sub">Net transfers in this event</div>
        ${risers.map(p=>`<div class="price-row"><span><span class="text-up">▲</span> ${p.web_name}</span><span class="mono text-muted" style="font-size:12px">+${p.net.toLocaleString()}</span></div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Price drop watch</div>
        <div class="card-sub">Net transfers out this event</div>
        ${fallers.map(p=>`<div class="price-row"><span><span class="text-down">▼</span> ${p.web_name}</span><span class="mono text-muted" style="font-size:12px">${p.net.toLocaleString()}</span></div>`).join('')}
      </div>
    </div>`;
}

function bindExperts(){
  const playerInput=document.getElementById('expert-player');
  const results=document.getElementById('expert-results');
  if(!playerInput) return;

  playerInput.addEventListener('input',()=>{
    expertSearch.selected=null;
    expertSearch.query=playerInput.value;
    const q=normalise(playerInput.value.trim());
    if(!q){results.innerHTML='';return;}
    const matches=state.players.filter(p=>normalise(p.web_name).includes(q)).slice(0,6);
    results.innerHTML=matches.length?`<div class="dropdown">${matches.map(p=>
      `<div class="dropdown-item" onclick="selectExpertPlayer(${p.id},'${p.web_name.replace(/'/g,"\\'")}')">
        ${p.web_name} <span class="text-muted">(${state.teamById[p.team]?.short_name||''})</span>
      </div>`).join('')}</div>`:'';
  });

  document.getElementById('add-pick-btn').addEventListener('click',()=>{
    const expert=document.getElementById('expert-name').value.trim();
    const note=document.getElementById('expert-note').value.trim();
    const gw=document.getElementById('expert-gw').value.trim();
    if(!expert||!expertSearch.selected) return;
    state.expertPicks=[...state.expertPicks,{
      id:Date.now().toString(), expert, note,
      gw:gw?parseInt(gw):null,
      playerId:expertSearch.selected.id,
      playerName:expertSearch.selected.web_name
    }];
    lsSet('fpl_expert_picks',state.expertPicks);
    expertSearch={query:'',selected:null};
    render();
  });

  const gwFilter=document.getElementById('gw-filter');
  if(gwFilter) gwFilter.addEventListener('change',()=>{state.expertsGW=gwFilter.value;render();});

  // Image scanning via Claude API
  const imgInput=document.getElementById('expert-image');
  const scanStatus=document.getElementById('scan-status');
  if(imgInput){
    imgInput.addEventListener('change',async()=>{
      const file=imgInput.files[0];
      if(!file) return;
      scanStatus.textContent='Scanning image…';
      try{
        const b64=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=()=>res(r.result.split(',')[1]);
          r.onerror=rej;
          r.readAsDataURL(file);
        });
        const expertName=document.getElementById('expert-name').value.trim()||'Scanned expert';
        const gwVal=document.getElementById('expert-gw').value.trim();
        // Route via Vercel serverless to avoid browser CORS on Anthropic API
        const resp=await fetch('/api/scan',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            imageData:b64,
            mediaType:file.type||'image/jpeg'
          })
        });
        if(!resp.ok){
          const err=await resp.text();
          throw new Error(`Scan API error ${resp.status}: ${err}`);
        }
        const data=await resp.json();
        if(data.error) throw new Error(data.error);
        const names=data.players||[];
        // Match to players
        let matched=0;
        names.forEach(name=>{
          const norm=normalise(name);
          const found=state.players.find(p=>normalise(p.web_name).includes(norm)||norm.includes(normalise(p.web_name)));
          if(found){
            state.expertPicks=[...state.expertPicks,{
              id:Date.now().toString()+'_'+found.id,
              expert:expertName, note:'scanned',
              gw:gwVal?parseInt(gwVal):null,
              playerId:found.id,
              playerName:found.web_name
            }];
            matched++;
          }
        });
        lsSet('fpl_expert_picks',state.expertPicks);
        scanStatus.textContent=`✓ Added ${matched} of ${names.length} players from image.`;
        render();
      } catch(e){
        scanStatus.textContent=`Scan failed: ${e.message}`;
      }
    });
  }
}

// ── TRANSFERS ─────────────────────────────────────────────────────────
function generateGWRecommendation(analysis, candidates){
  const urgentOuts=analysis.filter(p=>p.verdict==='out');
  const monitors=analysis.filter(p=>p.verdict==='monitor');
  const topCandidate=candidates[0];
  const myPlayerIds=new Set(state.myTeamIds);

  // Check if top candidate is significantly better than someone we'd transfer out
  const mustHaveScore=topCandidate?topCandidate.score:0;
  const worstHoldScore=urgentOuts.length?Math.min(...urgentOuts.map(p=>p.score)):1;
  const bigGain=mustHaveScore-worstHoldScore>0.2;

  if(urgentOuts.length>=2){
    return{
      type:'urgent',
      headline:'Multiple transfers recommended',
      body:`You have ${urgentOuts.length} players flagged with multiple concerns. If you have free transfers available, now is a good time to use them.`,
      bullets:[
        ...urgentOuts.map(p=>`Consider moving ${p.web_name} out (${p.flags.join(', ')})`),
        topCandidate?`${topCandidate.web_name} ranks highest for transfer in based on form, fixtures and stats`:null
      ].filter(Boolean)
    };
  } else if(urgentOuts.length===1&&bigGain){
    return{
      type:'act',
      headline:'One transfer worth making',
      body:`One targeted transfer looks worthwhile this week.`,
      bullets:[
        `Move ${urgentOuts[0].web_name} out — ${urgentOuts[0].flags.join(', ')}`,
        topCandidate?`${topCandidate.web_name} is the strongest candidate in (form: ${topCandidate.form}, FDR: ${fdrLabel(topCandidate.fdr)})`:null
      ].filter(Boolean)
    };
  } else if(monitors.length>0&&!urgentOuts.length){
    return{
      type:'act',
      headline:'Hold, but keep an eye on a couple',
      body:`No urgent moves needed, but ${monitors.length} player${monitors.length>1?'s are':' is'} worth watching.`,
      bullets:[
        ...monitors.map(p=>`${p.web_name}: ${p.flags.join(', ')}`),
        'Save your free transfer unless a better opportunity appears'
      ]
    };
  } else {
    return{
      type:'hold',
      headline:'Hold your transfers this week',
      body:'Your squad looks solid. No urgent concerns flagged — save your free transfer and let it roll.',
      bullets:[
        `${analysis.filter(p=>p.verdict==='hold').length} players are in hold territory`,
        topCandidate?`Best available if you do transfer in: ${topCandidate.web_name}`:null
      ].filter(Boolean)
    };
  }
}

function renderTransfers(){
  const myPlayers=state.myTeamIds.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
  const expertIds=new Set(state.expertPicks.map(e=>Number(e.playerId)));
  const myIds=new Set(state.myTeamIds);

  const analysis=myPlayers.map(p=>{
    const fdr=customFDR(p.team);
    const form=parseFloat(p.form)||0;
    const score=transferScore(p);
    const flags=[];
    if(form<3) flags.push('Cold form');
    if(fdr&&fdr>=3.8) flags.push('Tough fixture run');
    if(p.chance_of_playing_next_round!==null&&p.chance_of_playing_next_round<75)
      flags.push(`Injury doubt (${p.chance_of_playing_next_round}%)`);
    if((p.transfers_out_event||0)>(p.transfers_in_event||0)*1.5)
      flags.push('Heavily transferred out');
    const verdict=flags.length===0?'hold':flags.length===1?'monitor':'out';
    const label={hold:'HOLD',monitor:'MONITOR',out:'CONSIDER OUT'}[verdict];
    return{...p,fdr,flags,verdict,label,score};
  });

  const candidates=state.players
    .filter(p=>p.minutes>270&&!myIds.has(p.id))
    .map(p=>({
      ...p,
      fdr:customFDR(p.team),
      score:transferScore(p),
      isExpert:expertIds.has(p.id)
    }))
    .sort((a,b)=>b.score-a.score).slice(0,10);

  const rec=myPlayers.length>0?generateGWRecommendation(analysis,candidates):null;
  const recColors={hold:'var(--up)',act:'var(--amber)',urgent:'var(--down)'};

  const recBlock=rec?`
    <div class="gw-rec ${rec.type}">
      <div class="gw-rec-label" style="color:${recColors[rec.type]}">GW RECOMMENDATION</div>
      <div class="gw-rec-title" style="color:${recColors[rec.type]}">${rec.headline}</div>
      <div class="gw-rec-body">${rec.body}</div>
      <ul class="gw-rec-bullets">${rec.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
    </div>`:
    `<div class="tip-box">Add your squad in My Team to get a personalised GW recommendation here.</div>`;

  const squadRows=analysis.length===0
    ?`<div class="empty">No squad set yet — head to My Team to add your 15.</div>`
    :analysis.map(p=>`
      <div class="transfer-row ${p.verdict}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${posTag(POSMAP[p.element_type])} &nbsp;${p.web_name} <span class="text-muted" style="font-weight:400;font-size:12px">(${state.teamById[p.team]?.short_name||''})</span></div>
          ${p.flags.length?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${p.flags.join(' · ')}</div>`:''}
        </div>
        <span class="verdict verdict-${p.verdict}">${p.label}</span>
      </div>`).join('');

  const candidateRows=candidates.map((p,i)=>`
    <tr>
      <td style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">${i+1}</td>
      <td>${posTag(POSMAP[p.element_type])} &nbsp;${p.web_name}</td>
      <td class="text-muted" style="font-size:12px">${state.teamById[p.team]?.short_name||''}</td>
      <td class="mono" style="font-size:12px">${p.form}</td>
      <td class="mono" style="font-size:12px;color:${fdrColor(p.fdr)}">${fdrLabel(p.fdr)}</td>
      <td style="font-size:12px">${p.isExpert?'<span class="text-amber">✓</span>':'<span class="text-muted">–</span>'}</td>
      <td class="mono" style="font-size:12px">£${(p.now_cost/10).toFixed(1)}m</td>
    </tr>`).join('');

  return`
    ${recBlock}
    <div class="card">
      <div class="card-title">Your squad</div>
      <div class="card-sub">Scored on form, fixtures, stats, and value. Flags are independent of transfer candidates.</div>
      ${squadRows}
    </div>
    <div class="card">
      <div class="card-title">Transfer-in candidates</div>
      <div class="card-sub">Ranked by form (35%) + fixture ease (25%) + stat composite (25%) + value (10%) + expert backing (5%)</div>
      <table>
        <thead><tr><th>#</th><th>Player</th><th>Team</th><th>Form</th><th>FDR</th><th>Expert</th><th>£</th></tr></thead>
        <tbody>${candidateRows}</tbody>
      </table>
    </div>`;
}

// ── BUILD TEAM HISTORY from fixtures ─────────────────────────────────
function buildTeamHistory(){
  const history={};
  state.fixtures.filter(f=>f.finished&&f.team_h_score!=null).forEach(f=>{
    if(!history[f.team_h]) history[f.team_h]=[];
    if(!history[f.team_a]) history[f.team_a]=[];
    history[f.team_h].push({event:f.event,scored:f.team_h_score,conceded:f.team_a_score,was_home:true});
    history[f.team_a].push({event:f.event,scored:f.team_a_score,conceded:f.team_h_score,was_home:false});
  });
  state.teamHistory=history;
}

// ── INIT ──────────────────────────────────────────────────────────────
async function init(){
  try{
    const bs=await fplFetch('bootstrap-static/');
    if(!bs||!bs.elements) throw new Error('Invalid data from proxy');
    state.players=bs.elements;
    state.teams=bs.teams;
    state.teamById={};
    bs.teams.forEach(t=>state.teamById[t.id]=t);
    const events=bs.events||[];
    const anyFinished=events.some(e=>e.finished);
    document.getElementById('season-label').textContent=
      `FPL ANALYTICS · ${anyFinished?'2025/26 SEASON DATA':'PRE-SEASON'}`;

    const fx=await fplFetch('fixtures/');
    state.fixtures=fx||[];
    buildTeamHistory();

    state.myTeamIds=lsGet('fpl_my_team',[]);
    state.captainId=lsGet('fpl_captain',null);
    state.viceCaptainId=lsGet('fpl_vc',null);
    state.benchIds=lsGet('fpl_bench',[]);
    state.expertPicks=lsGet('fpl_expert_picks',[]);

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    render();
  } catch(e){
    document.getElementById('loading').innerHTML=`
      <div class="card" style="border-color:var(--down);text-align:left">
        <div class="card-title">Couldn't load data</div>
        <div style="font-size:13px;color:var(--down);font-family:'JetBrains Mono',monospace;margin-top:8px">${e.message}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px">Try reloading the page.</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="location.reload()">Retry</button>
      </div>`;
  }
}
init();
</script>
